<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora</title>
  <link rel="stylesheet" href="main.css">
</head>
<body>

  <div class="header">
    <select name="type" id="type" class="type">
      <option value="standard">Estándar</option>
      <option value="decimal_binary">Decimal a Binaria</option>
      <option value="binary_decimal">Binaria a Decimal</option>
      <option value="scientific">Científica</option>
    </select>
    <button class="circle" aria-label="Cambiar tema"></button>
  </div>

  <div class="container">
    <section class="display">
      <input type="text" id="operation" readonly autocomplete="off">
      <input type="text" id="result" readonly autocomplete="off">
    </section>

    <section class="buttons">
      <button class="btn btn-function" data-action="clearAll">AC</button>
      <button class="btn btn-function" data-action="clear">C</button>
      <button class="btn btn-function" data-action="delete">DEL</button>
      <button class="btn btn-function" data-action="operator" data-value="/">/</button>

      <button class="btn btn-number" data-action="digit" data-value="7">7</button>
      <button class="btn btn-number" data-action="digit" data-value="8">8</button>
      <button class="btn btn-number" data-action="digit" data-value="9">9</button>
      <button class="btn btn-function" data-action="operator" data-value="*">*</button>

      <button class="btn btn-number" data-action="digit" data-value="4">4</button>
      <button class="btn btn-number" data-action="digit" data-value="5">5</button>
      <button class="btn btn-number" data-action="digit" data-value="6">6</button>
      <button class="btn btn-function" data-action="operator" data-value="-">-</button>

      <button class="btn btn-number" data-action="digit" data-value="1">1</button>
      <button class="btn btn-number" data-action="digit" data-value="2">2</button>
      <button class="btn btn-number" data-action="digit" data-value="3">3</button>
      <button class="btn btn-function" data-action="operator" data-value="+">+</button>

      <button class="btn btn-number" data-action="digit" data-value="0">0</button>
      <button class="btn btn-number" data-action="decimal">.</button>
      <button class="btn btn-equals" data-action="equals">=</button>
    </section>
  </div>

  <script src="index.js"></script>
</body>
</html>
